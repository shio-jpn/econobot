name: My Routine Builder — CI

on:
  push:
    branches: [main, 'claude/**']
    paths:
      - 'my-routine-builder/**'
  pull_request:
    branches: [main]
    paths:
      - 'my-routine-builder/**'

defaults:
  run:
    working-directory: my-routine-builder

jobs:
  typecheck-and-build:
    name: TypeScript & Build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 10

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'pnpm'
          cache-dependency-path: my-routine-builder/pnpm-lock.yaml

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm tsc --noEmit
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_STRIPE_PRICE_ID: price_placeholder
          NEXT_PUBLIC_APP_URL: https://placeholder.vercel.app

      - name: Build
        run: pnpm build
        env:
          NEXT_PUBLIC_SUPABASE_URL: https://placeholder.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: placeholder_anon_key
          NEXT_PUBLIC_STRIPE_PRICE_ID: price_placeholder
          NEXT_PUBLIC_APP_URL: https://placeholder.vercel.app
